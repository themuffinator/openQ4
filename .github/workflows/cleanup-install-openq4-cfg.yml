name: Cleanup .install/openq4 cfg files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup-cfg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Remove .install/openq4 cfg files
        run: |
          set -euo pipefail
          rm -f .install/openq4/*.cfg

      - name: Commit and push cleanup
        run: |
          set -euo pipefail

          if git diff --quiet -- .install/openq4; then
            echo "No cfg files found to remove."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .install/openq4
          git commit -m "chore: remove .install/openq4 cfg files"
          git push
